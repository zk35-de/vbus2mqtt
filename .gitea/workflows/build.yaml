name: Build & Publish Container

on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          podman run --rm -v "$PWD":/src:z -w /src \
            docker.io/library/golang:1.23-alpine \
            go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Register QEMU for multi-arch builds
        run: podman run --rm --privileged docker.io/multiarch/qemu-user-static --reset -p yes

      - name: Set build tag
        id: tag
        run: echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build linux/amd64
        run: |
          podman build --platform linux/amd64 \
            --build-arg VERSION=${{ steps.tag.outputs.value }} \
            -t git.zk35.de/secalpha/vbus2mqtt:${{ steps.tag.outputs.value }}-amd64 .

      - name: Build linux/arm/v7 (RPi 3B, 32-bit OS)
        run: |
          podman build --platform linux/arm/v7 \
            --build-arg VERSION=${{ steps.tag.outputs.value }} \
            -t git.zk35.de/secalpha/vbus2mqtt:${{ steps.tag.outputs.value }}-armv7 .

      - name: Build linux/arm64 (RPi 3B/4/5, 64-bit OS)
        run: |
          podman build --platform linux/arm64 \
            --build-arg VERSION=${{ steps.tag.outputs.value }} \
            -t git.zk35.de/secalpha/vbus2mqtt:${{ steps.tag.outputs.value }}-arm64 .

      - name: Login and push multi-arch manifest
        env:
          GITEA_TOKEN: ${{ secrets.VBUS2MQTTCI }}
          TAG: ${{ steps.tag.outputs.value }}
          IMAGE: git.zk35.de/secalpha/vbus2mqtt
        run: |
          podman login git.zk35.de -u secalpha -p ${GITEA_TOKEN}

          podman push ${IMAGE}:${TAG}-amd64
          podman push ${IMAGE}:${TAG}-armv7
          podman push ${IMAGE}:${TAG}-arm64

          podman manifest rm ${IMAGE}:${TAG} 2>/dev/null || podman rmi ${IMAGE}:${TAG} 2>/dev/null || true
          podman manifest create ${IMAGE}:${TAG} \
            ${IMAGE}:${TAG}-amd64 \
            ${IMAGE}:${TAG}-armv7 \
            ${IMAGE}:${TAG}-arm64
          podman manifest push ${IMAGE}:${TAG}

          podman manifest rm ${IMAGE}:latest 2>/dev/null || podman rmi ${IMAGE}:latest 2>/dev/null || true
          podman manifest create ${IMAGE}:latest \
            ${IMAGE}:${TAG}-amd64 \
            ${IMAGE}:${TAG}-armv7 \
            ${IMAGE}:${TAG}-arm64
          podman manifest push ${IMAGE}:latest
