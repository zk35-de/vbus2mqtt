---
# /opt/stack/vbus2mqtt/compose.yml
#
# Setup:
#   sudo mkdir -p /opt/stack/vbus2mqtt /opt/stack-data/vbus2mqtt
#   sudo cp compose.yml .env /opt/stack/vbus2mqtt/
#   sudo $EDITOR /opt/stack/vbus2mqtt/.env     # MQTT_BROKER + Credentials setzen
#   cd /opt/stack/vbus2mqtt && podman compose up -d
#
# Als systemd User-Service (damit der Dienst ohne SSH-Session läuft):
#   sudo loginctl enable-linger <user>
#   systemctl --user enable --now podman-compose@vbus2mqtt

services:
  vbus2mqtt:
    image: git.zk35.de/secalpha/vbus2mqtt:latest
    container_name: vbus2mqtt
    restart: unless-stopped
    env_file: .env
    network_mode: host
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    privileged: true
    volumes:
      - /opt/stack-data/vbus2mqtt:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
