---
# Podman Compose / Docker Compose
#
# Quickstart:
#   cp .env.example .env && $EDITOR .env
#   docker compose up -d
#
# Multi-arch build:
#   docker buildx build --platform linux/amd64,linux/arm64 \
#     --build-arg VERSION=$(git describe --tags --always) -t vbus2mqtt .

services:

  vbus2mqtt:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
    image: vbus2mqtt:latest
    container_name: vbus2mqtt
    restart: unless-stopped
    env_file: .env
    # network_mode: host → ports mapping has no effect and is omitted.
    # Web UI is reachable at http://<host-ip>:8080 directly via the host stack.
    # Set MQTT_BROKER=tcp://localhost:1883 in .env to reach a local broker.
    network_mode: host
    # USB serial device access
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    # privileged: true is a fallback for unknown/changing device paths.
    # Recommended: add a udev rule for a stable symlink and remove privileged:
    #   SUBSYSTEM=="tty", ATTRS{idVendor}=="10c4", ATTRS{idProduct}=="ea60", SYMLINK+="ttyVBUS"
    # then set devices: [/dev/ttyVBUS:/dev/ttyUSB0] and drop privileged.
    privileged: true
    volumes:
      - vbus2mqtt_data:/data   # persists config changes made via the web UI
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: local Mosquitto broker for testing
  # Remove this service if you have an existing MQTT broker.
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

volumes:
  vbus2mqtt_data:
  mosquitto_data:
  mosquitto_log:
