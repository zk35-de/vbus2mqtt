---
# Podman Compose / Docker Compose
#
# Quickstart:
#   cp .env.example .env && $EDITOR .env
#   docker compose up -d
#
# Multi-arch build:
#   docker buildx build --platform linux/amd64,linux/arm64 -t vbus2mqtt .

services:

  vbus2mqtt:
    build:
      context: .
      dockerfile: Dockerfile
    image: vbus2mqtt:latest
    container_name: vbus2mqtt
    restart: unless-stopped
    env_file: .env
    # USB serial device access
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    # privileged gives full access to all /dev devices; use when the device
    # path is unknown or changes between reboots (udev rules recommended instead)
    privileged: true
    # VBus bridge only needs outbound TCP to the MQTT broker
    network_mode: host
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: local Mosquitto broker for testing
  # Remove this service if you have an existing MQTT broker.
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

volumes:
  mosquitto_data:
  mosquitto_log:
